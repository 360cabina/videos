<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Video 360</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: url('./fondo.jpg') no-repeat center center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* oscurecer */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.container {
  position: relative;
  text-align: center;
  color: white;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 60px;
  color: #ff00cc;
  text-shadow: 0 0 10px #ff00cc, 0 0 30px #ff00cc;
}

#qr {
  width: 320px;
  margin-top: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px #ff00cc, 0 0 40px #ff00cc;
}

#nombre {
  margin-top: 25px;
  font-family: 'Pacifico', cursive;
  font-size: 40px;
  color: #ff66ff;
  text-shadow: 0 0 10px #ff66ff, 0 0 20px #ff00cc;
}
</style>
</head>

<body>

<div class="container">
  <h1>DESCARGA TU VIDEO</h1>
  <img id="qr">
  <div id="nombre"></div>
</div>

<script>
let linkActual = "";
let linkConfirmado = "";
let buffer = [];

// 🔥 función robusta
async function cargarQR() {
  try {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkQ1Ou-lc_68dncM1P-58VZPmNYYa4T1z3grXWrxgp3YloABytN7u6I-L3WNbGS8BmJr4KSIX66c1H/pub?output=csv&t=" + Date.now();

    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();

    const filas = text.split("\n");

    let link = "";
    let nombre = "";

    // 🔥 última fila válida REAL
    for (let i = filas.length - 1; i >= 0; i--) {
      let fila = filas[i].trim();
      if (!fila) continue;

      let partes = fila.split(",");

      if (partes.length >= 2) {
        let n = partes[0].replace(/"/g, "").trim();
        let l = partes[1].replace(/"/g, "").trim();

        if (l.startsWith("http")) {
          nombre = n;
          link = l;
          break;
        }
      }
    }

    if (!link) return;

    // 🔥 sistema anti rebote REAL
    if (link !== linkActual) {
      linkActual = link;
      buffer = [];
    }

    buffer.push(link);

    // mantener últimos 3 lecturas iguales
    if (buffer.length > 3) buffer.shift();

    let todosIguales = buffer.every(v => v === linkActual);

    if (todosIguales && linkConfirmado !== linkActual) {
      linkConfirmado = linkActual;

      let qr = "https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=" + encodeURIComponent(linkConfirmado);

      document.getElementById("qr").src = qr;
      document.getElementById("nombre").innerText = nombre;
    }

  } catch (e) {
    console.error(e);
  }
}

// refresco estable
cargarQR();
setInterval(cargarQR, 3000);
</script>

</body>
</html>
